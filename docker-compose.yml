services:
  redis:
    image: redis:latest
    container_name: local-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    command: ["redis-server"]
    volumes:
      - redis_data:/data

volumes:
  redis_data: